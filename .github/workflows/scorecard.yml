name: Scorecard

# Reusable OpenSSF Scorecard analysis for the Star* repos. Each repo's
# scorecard.yml is a thin caller that owns the triggers + permissions:
#
#   on:
#     branch_protection_rule:
#     schedule:
#       - cron: '27 4 * * 1'
#     push:
#       branches: ["master"]
#   permissions: read-all
#   jobs:
#     scorecard:
#       permissions:
#         security-events: write   # upload SARIF to code scanning
#         id-token: write          # publish results to the OpenSSF API (badge)
#         contents: read
#       uses: 1set/meta/.github/workflows/scorecard.yml@<pinned-sha>
#
# Uses the ephemeral GITHUB_TOKEN — no PAT. The Branch-Protection check is
# limited without an admin-read PAT; every other check runs normally.
on:
  workflow_call:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
