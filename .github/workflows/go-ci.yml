name: Go CI

# Reusable CI for the Star* Go modules.
#
# Each repo's build.yml is a thin caller:
#
#   jobs:
#     ci:
#       uses: 1set/meta/.github/workflows/go-ci.yml@<pinned-tag-or-sha>
#       with:
#         go-floor: "1.19"            # the repo's go.mod floor (email/markdown "1.22", mq "1.23")
#         # working-directory: "."    # optional: path to the Go module (default repo root)
#       secrets: inherit
#
# The matrix tests <go-floor> + the latest stable Go across
# ubuntu-22.04 / macos-14 / windows-2022. Static checks (vet, gofmt,
# go mod tidy) and govulncheck run once, on the latest-Go Linux leg;
# coverage uploads run on the floor Linux leg (the established report leg).
#
# This workflow is self-tested in meta itself: .github/workflows/selftest.yml
# calls it against the selftest/ fixture, so changes here are validated before
# the consuming repos re-pin.
on:
  workflow_call:
    inputs:
      go-floor:
        description: "The repo's go.mod floor minor version, e.g. '1.19' or '1.22'."
        required: true
        type: string
      working-directory:
        description: "Path to the Go module within the repo (default: repo root)."
        required: false
        type: string
        default: "."
      doc-coverage:
        description: "Run the doccov README<->builtin consistency gate (starpkg domain modules)."
        required: false
        type: boolean
        default: false
      cov-min:
        description: "Minimum total test coverage percent required, ratchet floor (0 = no gate)."
        required: false
        type: number
        default: 0
      footprint:
        description: "Measure the module's marginal binary-size footprint (badge + bloat gate)."
        required: false
        type: boolean
        default: false
      footprint-max-mb:
        description: "Fail if the stripped binary-footprint delta exceeds this many MB (0 = report only)."
        required: false
        type: number
        default: 0
    secrets:
      CODECOV_TOKEN:
        required: false
      CODACY_PROJECT_TOKEN:
        required: false

permissions: read-all

jobs:
  build:
    name: Test with ${{ matrix.go-version }} on ${{ matrix.vm-os }}
    runs-on: ${{ matrix.vm-os }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}
    env:
      # Coverage upload leg: floor Go on Linux (the report leg downstreams expect).
      IS_REPORT: ${{ matrix.vm-os == 'ubuntu-22.04' && matrix.go-version == format('{0}.x', inputs.go-floor) }}
      # Static-check leg: latest Go on Linux (newest toolchain = most reliable
      # vet/gofmt/tidy/govulncheck; avoids building govulncheck on an old floor).
      IS_CHECKS: ${{ matrix.vm-os == 'ubuntu-22.04' && matrix.go-version == '1.25.x' }}
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix:
        vm-os:
          - ubuntu-22.04
          - macos-14
          - windows-2022
        go-version:
          - "${{ inputs.go-floor }}.x"
          - "1.25.x"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum
      - name: Build
        run: |
          go version
          go mod download
      # --- static checks: once, on the latest-Go Linux leg ---
      - name: Vet
        if: ${{ fromJSON(env.IS_CHECKS) }}
        run: go vet ./...
      - name: Gofmt
        if: ${{ fromJSON(env.IS_CHECKS) }}
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::these files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - name: Go mod tidy check
        if: ${{ fromJSON(env.IS_CHECKS) }}
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      # Doc coverage (opt-in): every starlark.NewBuiltin a module exposes to
      # scripts must be documented in its README. The gate lives in meta and is
      # fetched with `go run` like govulncheck below; enable it via the
      # doc-coverage input on starpkg domain modules.
      - name: Doc coverage
        if: ${{ fromJSON(env.IS_CHECKS) && inputs.doc-coverage }}
        run: go run github.com/1set/meta/doccov@master .
      - name: Test
        run: make ci
      # Test-coverage gate (ratchet): covcheck parses the coverage.txt that
      # `make ci` wrote and fails if total coverage drops below cov-min. Floor
      # leg. Gated on cov-min > 0 so repos opt in with their ratchet floor.
      - name: Coverage gate
        if: ${{ fromJSON(env.IS_REPORT) && inputs.cov-min > 0 }}
        run: go run github.com/1set/meta/covcheck@master -min ${{ inputs.cov-min }} coverage.txt
      # Binary footprint (opt-in): measure the marginal binary size the module
      # adds over a bare starlet host; fails if the stripped delta exceeds
      # footprint-max-mb (0 = report only). Floor leg for comparable numbers.
      - name: Binary footprint
        if: ${{ fromJSON(env.IS_REPORT) && inputs.footprint }}
        run: |
          modpath=$(awk '/^module /{print $2; exit}' go.mod)
          go run github.com/1set/meta/footprint@master -modpath "$modpath" -dir . -max-mb ${{ inputs.footprint-max-mb }}
      # govulncheck is informational (continue-on-error): it surfaces dependency
      # CVEs in the run log without gating merges. Promote to gating once the
      # ecosystem floor lets known findings be fixed in-place.
      - name: Vulncheck (informational)
        if: ${{ fromJSON(env.IS_CHECKS) }}
        continue-on-error: true
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      # The coverage GATE is the codecov/project and codecov/patch commit
      # statuses set by the Codecov app after this upload; continue-on-error
      # here only tolerates upload-channel outages, it does not bypass the gate.
      - name: Upload Coverage Reports to Codecov
        if: ${{ fromJSON(env.IS_REPORT) }}
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ inputs.working-directory }}/coverage.txt
      - name: Upload Coverage Reports to Codacy
        if: ${{ fromJSON(env.IS_REPORT) }}
        continue-on-error: true
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run:
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report --force-coverage-parser go -r coverage.txt
      - name: Analyze
        if: ${{ fromJSON(env.IS_CHECKS) }}
        run: |
          # Setup (tokei: v12.1.2 is the last release with prebuilt binaries;
          # revive: pinned to a current release)
          wget -cqL https://github.com/XAMPPRocky/tokei/releases/download/v12.1.2/tokei-i686-unknown-linux-musl.tar.gz -O tokei.tgz
          wget -cqL https://github.com/mgechev/revive/releases/download/v1.15.0/revive_linux_amd64.tar.gz -O revive.tgz
          tar zxf tokei.tgz tokei && chmod +x tokei && $SUDO mv tokei /usr/local/bin && rm tokei.tgz
          tar zxf revive.tgz revive && chmod +x revive && $SUDO mv revive /usr/local/bin && rm revive.tgz
          wget -cqL https://raw.githubusercontent.com/1set/meta/master/revive.toml -O revive.toml
          # Analyze
          echo "# Analysis on ${{ runner.os }}" > $GITHUB_STEP_SUMMARY
          uname -a >> $GITHUB_STEP_SUMMARY
          # --- count lines of code
          echo "## Tokei Result" >> $GITHUB_STEP_SUMMARY
          printf '\n```\n' >> $GITHUB_STEP_SUMMARY
          tokei >> $GITHUB_STEP_SUMMARY
          printf '```\n\n' >> $GITHUB_STEP_SUMMARY
          # --- lint
          echo "## Revive Result" >> $GITHUB_STEP_SUMMARY
          printf '\n```\n' >> $GITHUB_STEP_SUMMARY
          revive -config revive.toml -formatter friendly ./... >> $GITHUB_STEP_SUMMARY
          printf '```\n\n' >> $GITHUB_STEP_SUMMARY
